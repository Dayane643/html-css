<!DOCTYPE html>
<html lang="Pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fontes com Google fonts</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playwrite+US+Trad+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap");
      body {
        font-family: "work sans", arial, verdana, sans-serif;
        font-size: 16px;
        color: black;
      }

      h1 {
        font-family: "Titillium Web", sans-serif;
        font-size: 3em;
      }
    </style>
  </head>
  <body>
    <h1>Título</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Repudiandae,
      accusamus at aliquid sapiente impedit illo quasi odit ab quidem
      praesentium fugit minima. Labore sunt illo nam totam magnam libero ullam?
    </p>
  </body>
</html>
