<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>parágrafos e quebras de linhas</h1>
    <hr>
    <p>Voce pode escrever um parágrafo, basta colocar tudo dentro da tags &lt;p&gt; e &lt;/p&gt; </p>
    <p>caso precisa quebrar a linha basta usar a tag &lt;br&gt;</p>
    <p>Vamos adicionar alguns simbolos especias:
        &copy; <!--símbolo do c dentro de um circulo-->
        &trade; <!--símbolo tm-->
        &euro; <!--símbolo do euro-->
        &pound; <!--Símbolo libra-->
        &yen;<!--Símbolo japones-->
        &cent;<!--centavos americano -->
        &Delta;
        &uparrow; <!--seta para cima -->
        &darr; <!--seta para baixo-->
        &rarr; <!--seta para direita-->
        &uarr; <!--seta para esquerda-->
    </p>
    <p>vamos adicionar emojis:
        😏
        💘 🐼 🏳️‍🌈 📿
    </p>
</body>
</html>
